[build-system]
requires = ["setuptools>=64", "wheel>=0.38", "cmake>=3.18", "pybind11>=2.6"]
build-backend = "setuptools.build_meta"

[project]
name = "duckclaw"
version = "0.1.0"
description = "High-performance C++ analytical memory layer for sovereign AI agents."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
dependencies = [
    "rich>=13.0.0",
]

[project.scripts]
duckops = "duckclaw.ops.cli:_entrypoint"
duckclaw-cli = "duckclaw.ops.cli:_entrypoint"

[project.optional-dependencies]
telegram = ["python-telegram-bot>=21,<22"]
dashboard = ["streamlit>=1.28"]
langgraph = [
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.2.0",
]
# crewai: omitido por conflictos con openai/langchain; instalar aparte si se necesita
openai = [
    "openai>=1.0.0",
]
agents = [
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.2.0",
    "python-telegram-bot>=21,<22",
    "openpyxl>=3.1.0",
    "matplotlib>=3.7.0",
]
groq = [
    "langchain-groq>=0.2.0",
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
]
fabric = [
    "azure-storage-file-datalake>=12.14.0",
    "azure-identity>=1.15.0",
]
# all = telegram + dashboard + langgraph + openai (sin crewai: conflictos de deps con openai/langchain)
all = [
    "python-telegram-bot>=21,<22",
    "streamlit>=1.28",
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.2.0",
    "openai>=1.0.0",
]