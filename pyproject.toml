[build-system]
requires = ["setuptools>=64", "wheel>=0.38", "cmake>=3.18", "pybind11>=2.6"]
build-backend = "setuptools.build_meta"

[project]
name = "duckclaw"
version = "0.1.0"
description = "High-performance C++ analytical memory layer for sovereign AI agents."
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
dependencies = [
    "langgraph-cli[inmem]>=0.4.3",
    "rich>=13.0.0",
]

[project.scripts]
duckops = "duckclaw.ops.cli:_entrypoint"
duckclaw-cli = "duckclaw.ops.cli:_entrypoint"

[project.optional-dependencies]
telegram = ["python-telegram-bot>=21,<22"]
dashboard = ["streamlit>=1.28"]
langgraph = [
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.2.0",
]
# crewai: omitido por conflictos con openai/langchain; instalar aparte si se necesita
openai = [
    "openai>=1.0.0",
]
agents = [
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.2.0",
    "python-telegram-bot>=21,<22",
    "openpyxl>=3.1.0",
    "matplotlib>=3.7.0",
    "pyyaml>=6.0",
    "sqlglot>=20.0.0",
]
groq = [
    "langchain-groq>=0.2.0",
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
]
fabric = [
    "azure-storage-file-datalake>=12.14.0",
    "azure-identity>=1.15.0",
]

ollama = [
    "langchain-ollama>=0.2.0",
]

huggingface = [
    "langchain-huggingface>=0.1.0",
    "huggingface-hub>=0.23.0",
]

serve = [
    "fastapi>=0.128.8",
    "uvicorn[standard]>=0.39.0",
    "PyJWT>=2.0.0",
    "slowapi>=0.1.9",
    "sqlglot>=20.0.0",
]

# queue: Redis + ARQ para ActivityManager (orquestación)
queue = [
    "redis>=5.0.0",
    "arq>=0.25.0",
]

sandbox = [
    "docker>=7.0.0",
]

arrow = [
    "duckdb>=1.0.0",
    "pyarrow>=14.0.0",
    "pandas>=2.0.0",
    "tabulate>=0.9.0",
]

# redis: cola de escrituras DuckDB (SingletonWriterBridge). uv sync --extra redis
redis = [
    "redis>=5.0.0",
]

# rag: DuckDB VSS + embeddings para CatalogRetriever. uv sync --extra rag
rag = [
    "sentence-transformers>=2.2.0",
]

# multimodal: voz (Whisper) y visión (VLM) locales. uv sync --extra multimodal
multimodal = [
    "mlx-whisper>=0.4.0",
    "Pillow>=10.0.0",
]

# github: requiere Python>=3.10 (mcp). Instalar con: uv sync --extra github (python 3.10+)
github = [
    "mcp>=1.0.0; python_version>='3.10'",
]

# tavily: búsqueda web en tiempo real. Requiere TAVILY_API_KEY
tavily = [
    "tavily-python>=0.5.0",
]

# web: requests + beautifulsoup4 para fetch_product_catalog (Power Seal)
web = [
    "requests>=2.28.0",
    "beautifulsoup4>=4.12.0",
]

# browser: navegación autónoma con Playwright. Requiere Python>=3.11. Phase 2: Strix Sandbox
browser = [
    "browser-use>=0.1.0; python_version>='3.11'",
    "playwright>=1.44.0; python_version>='3.11'",
]

# dev: CI/CD — pytest, mypy, sqlglot para validación
dev = [
    "pytest>=7.0.0",
    "mypy>=1.0.0",
    "sqlglot>=20.0.0",
    "types-PyYAML>=6.0",
]

# all = telegram + dashboard + langgraph + openai + sandbox + arrow (sin crewai: conflictos de deps)
all = [
    "python-telegram-bot>=21,<22",
    "streamlit>=1.28",
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.2.0",
    "openai>=1.0.0",
    "docker>=7.0.0",
    "duckdb>=1.0.0",
    "pyarrow>=14.0.0",
    "pandas>=2.0.0",
    "tabulate>=0.9.0",
    "tavily-python>=0.5.0",
]
