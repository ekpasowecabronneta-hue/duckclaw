[build-system]
requires = ["setuptools>=64", "wheel>=0.38", "cmake>=3.18", "pybind11>=2.6"]
build-backend = "setuptools.build_meta"

[project]
name = "duckclaw-core"
version = "0.1.0"
description = "Native C++ bridge for DuckDB"
requires-python = ">=3.9"
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["duckclaw"]
