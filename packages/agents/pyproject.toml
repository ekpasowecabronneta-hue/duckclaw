[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "duckclaw-agents"
version = "0.1.0"
description = "LangGraph agents and workers for DuckClaw"
requires-python = ">=3.9"
dependencies = [
    "langgraph>=0.2.0",
    "redis>=5.0.0",
    "duckclaw-core",
    "duckclaw-shared",
    "docker",
    "requests>=2.28.0",
    "PyYAML>=6.0.1",
    "tavily-python>=0.5.0",
    "mcp>=1.0.0; python_full_version >= '3.10'",
]

[project.optional-dependencies]
google-trends = [
    "google-trends-mcp>=1.0.2; python_full_version >= '3.10'",
]

[tool.setuptools]
package-dir = {"" = "src"}
# duckclaw.graphs (src/duckclaw/graphs), duckclaw.workers, duckclaw.forge (forge/skills en forge)
packages = ["duckclaw.graphs", "duckclaw.workers", "duckclaw.forge", "duckclaw.api"]
