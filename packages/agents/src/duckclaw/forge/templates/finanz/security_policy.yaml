# Strix: run_sandbox y run_browser_sandbox comparten policy. default: allow → Docker bridge (necesario para Playwright → mql5.com).
# allow_list documenta intención; filtrado L7 en runtime no aplicado aún (igual que Job-Hunter).
network:
  default: allow
  allow_list:
    - mql5.com
    - www.mql5.com
filesystem:
  readonly_mounts:
    - "/Users/juanjosearevalocamargo/Desktop/duckclaw/db:/workspace/repo_db:ro"
    - "/tmp/duckclaw_sandbox:/workspace/data:ro"
  ephemeral_volumes:
    - "/workspace/output"
secrets:
  in_memory_only: true
  allowed_secrets: []
max_execution_time_seconds: 120
