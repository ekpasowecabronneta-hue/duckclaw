name: BI Analyst
id: bi_analyst
schema_name: analytics_core
topology: general
read_only: true
allowed_tables:
  - sales
  - system_metrics
llm:
  required: true
  temperature: 0.2
context_guard:
  enabled: true
  max_retries: 2
context_pruning:
  enabled: true
  max_messages: 10
  max_estimated_tokens: 4000
  keep_last_messages: 3
  tool_content_max_chars: 8000
  sandbox_heartbeat: true
skills:
  - get_schema_info
  - explain_sql
execution:
  policies:
    timeout_ms: 30000