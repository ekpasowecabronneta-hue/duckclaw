site_name: DuckClaw Docs
site_description: DuckClaw architecture, agents, specs, and API docs
repo_name: duckclaw
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - toc.follow
    - content.code.copy

plugins:
  - search:
      lang:
        - en
        - es
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            heading_level: 2
          paths:
            - packages/agents/src
            - packages/shared/src

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
      - Singleton Writer: architecture/singleton_writer.md
      - Tri-Cameral Memory: architecture/tri_cameral_memory.md
      - Strix Sandbox: architecture/strix_sandbox.md
  - Agents:
      - ADF Framework: agents/adf_framework.md
      - Finanz: agents/finanz.md
      - Quant Trader: agents/quant_trader.md
  - Specs:
      - Overview: specs/index.md
      - Finanz Admin SQL DB-Writer: specs/finanz_admin_sql_db_writer.md
      - Context Injection Telegram: specs/context_injection_telegram.md
      - Telegram Webhook Multiplex: specs/telegram_webhook_multiplex.md
      - VLM Integration: specs/vlm_integration.md
  - API:
      - DB Writer: api/db_writer.md
      - API Gateway: api/api_gateway.md
  - Operations:
      - Overview: operations/index.md
      - Installation: Installation.md
      - Commands: COMANDOS.md
      - Troubleshooting Gateway PM2: Troubleshooting-Gateway-PM2.md
      - Observability and Identity: Observability-2.1-Identidad.md
      - Strix Sandbox Security: Strix-Sandbox-Security.md
      - Homeostasis Heartbeat: Homeostasis-Heartbeat.md
      - Jugar The Mind: Jugar-The-Mind.md
      - Multi Vault System: Multi-Vault-System.md
